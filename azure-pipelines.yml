variables:
  acrServiceConn: "pipeline"
  acrRepo: "backend-test"
  tag: '$(Build.BuildId)'
  acrRegistry: "pipeline.azurecr.io"
  sshConnName: "vm-ssh-conn"
  containerName: backend-test-app

pool:
  vmImage: ubuntu-latest

steps:
# 1. 构建镜像
- task: Docker@2
  displayName: Build Image
  inputs:
    command: build
    containerRegistry: $(acrServiceConn)
    repository: $(acrRepo)
    dockerfile: Dockerfile
    tags: $(tag)
    arguments: --progress plain

# 2. 推送镜像到ACR仓库
- task: Docker@2
  displayName: Push to ACR
  inputs:
    command: push
    containerRegistry: $(acrServiceConn)
    repository: $(acrRepo)
    tags: $(tag)

# 3. SSH远程部署（修复容器不存在报错+修复acr登录域名警告）
- task: SSH@0
  displayName: Deploy new image to Azure VM
  inputs:
    sshEndpoint: $(sshConnName)
    runOptions: inline
    inline: |
      az login --identity
      # 截取acr短名 pipeline，去除.azurecr.io
      ACR_SHORT=$(echo $(acrRegistry) | cut -d'.' -f1)
      az acr login --name $ACR_SHORT

      FULL_IMG=$(acrRegistry)/$(acrRepo):$(tag)
      docker pull $FULL_IMG

      # 容器不存在时静默跳过，不输出错误
      docker ps -a --filter "name=^/${containerName}$" | grep -q . && {
        docker stop ${containerName}
        docker rm ${containerName}
      } || true

      docker run -d \
        --name ${containerName} \
        --restart always \
        -p 8080:8080 \
        $FULL_IMG

      docker ps | grep ${containerName}