trigger:
- master

variables:
  dockerRegistryServiceConnection: '900c2bfc-4506-44e5-b466-94672a1e7311'
  imageRepository: 'myapp'
  dockerfilePath: '**/Dockerfile'
  tag: '$(Build.BuildId)'

stages:

#-------------------------------------------------------
# Stage 1 - Build & Push
#-------------------------------------------------------
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

#-------------------------------------------------------
# Stage 2 - Deploy
#-------------------------------------------------------
- stage: Deploy
  displayName: Deploy to VM
  dependsOn: Build
  jobs:
  - deployment: DeployToVM
    displayName: Deploy Docker Container
    environment: env-test
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: none
          - script: |
              # 完全删除az login相关代码，直接docker登录ACR
              FULL_IMG="pipeline2.azurecr.io/$(imageRepository):$(tag)"
              echo "正在登录ACR：$FULL_IMG"
              docker login pipeline2.azurecr.io -u $(ACR_USER) -p $(ACR_PWD)
              FULL_IMG="$(acrRegistry)/$(acrRepo):$(tag)"
              echo "Pull image: $FULL_IMG"
              docker pull "$FULL_IMG"

              # 安全删除旧容器，加引号避免空变量报错
              if docker ps -a --filter "name=^/$(containerName)$" | grep -q .; then
                docker stop "$(containerName)"
                docker rm "$(containerName)"
              fi

              # 整行docker run不换行拆分，彻底避免always被识别为镜像
              docker run -d --name "$(containerName)" --restart always -p 8080:8080 "$FULL_IMG"

              docker ps | grep "$(containerName)"
            displayName: Deploy Container