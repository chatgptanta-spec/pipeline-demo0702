trigger:
- master

variables:
  dockerRegistryServiceConnection: '900c2bfc-4506-44e5-b466-94672a1e7311'
  imageRepository: 'myapp'
  dockerfilePath: '**/Dockerfile'
  tag: '$(Build.BuildId)'

stages:

#-------------------------------------------------------
# Stage 1 - Build & Push
#-------------------------------------------------------
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

#-------------------------------------------------------
# Stage 2 - Deploy
#-------------------------------------------------------
- stage: Deploy
  displayName: Deploy to VM
  dependsOn: Build
  jobs:
  - deployment: DeployToVM
    displayName: Deploy Docker Container
    environment: env-test
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: none
          - script: |
              # 完全删除az login相关代码，直接docker登录ACR
              FULL_IMG="pipeline2.azurecr.io/$(imageRepository):$(tag)"
              echo "正在登录ACR：$FULL_IMG"
              docker login pipeline2.azurecr.io -u $(ACR_USER) -p $(ACR_PWD)
              docker pull "$FULL_IMG"

              # 标准写法，把stderr重定向空设备，彻底隐藏No such container报错
              docker stop myapp 2>/dev/null || true
              docker rm myapp 2>/dev/null || true

              echo "准备启动新容器"
              docker run -d \
                --restart unless-stopped \
                --name myapp \
                -p 80:8080 \
                "$FULL_IMG"

              echo "部署完成，运行容器："
              docker ps | grep myapp